<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SubtitleCat 中文字幕下载</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #111a2e;
        --text: #e8eefc;
        --muted: #a7b2d6;
        --border: rgba(255, 255, 255, 0.12);
        --primary: #4f7cff;
        --primary2: #2f5bff;
        --danger: #ff5a7a;
        --ok: #35d07f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: radial-gradient(1200px 600px at 20% 0%, rgba(79,124,255,.35), transparent 60%),
                    radial-gradient(900px 600px at 90% 20%, rgba(53,208,127,.25), transparent 60%),
                    var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 24px 14px 40px;
      }
      .wrap { max-width: 920px; margin: 0 auto; }
      .header { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
      .title { font-size: 22px; font-weight: 700; letter-spacing: .2px; }
      .subtitle { color: var(--muted); font-size: 13px; line-height: 1.6; }
      .card {
        background: rgba(17,26,46,.88);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: 0 18px 50px rgba(0,0,0,.35);
        padding: 14px;
      }
      .row { display: grid; grid-template-columns: 1fr; gap: 10px; }
      @media (min-width: 780px) {
        .row { grid-template-columns: 1.2fr .8fr; align-items: start; }
      }
      .inputRow { display: grid; grid-template-columns: 1fr; gap: 10px; }
      @media (min-width: 520px) {
        .inputRow { grid-template-columns: 1fr auto; }
      }
      input[type="text"] {
        width: 100%;
        padding: 12px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(10, 16, 30, .75);
        color: var(--text);
        outline: none;
        font-size: 14px;
      }
      input[type="text"]:focus { border-color: rgba(79,124,255,.7); box-shadow: 0 0 0 4px rgba(79,124,255,.18); }
      button {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid rgba(79,124,255,.45);
        background: linear-gradient(180deg, rgba(79,124,255,.95), rgba(47,91,255,.95));
        color: white;
        cursor: pointer;
        font-weight: 700;
        font-size: 14px;
        letter-spacing: .2px;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: .6;
      }
      .hint { margin-top: 10px; color: var(--muted); font-size: 12px; line-height: 1.6; }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
        background: rgba(10, 16, 30, .55);
      }
      .grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .kv {
        display: grid;
        grid-template-columns: 140px 1fr;
        gap: 8px 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(10, 16, 30, .55);
      }
      .k { color: var(--muted); font-size: 12px; }
      .v { font-size: 13px; word-break: break-word; }
      a { color: #bcd0ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
      .status {
        margin-top: 10px;
        font-size: 13px;
        color: var(--muted);
      }
      .status.error { color: var(--danger); }
      .status.ok { color: var(--ok); }
      .actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; align-items: center; }
      .actions a.secondary {
        display: inline-block;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(10, 16, 30, .55);
        color: var(--text);
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        cursor: pointer;
      }
      .actions a.secondary.muted {
        opacity: 0.45;
        cursor: not-allowed;
        pointer-events: none;
      }
      .secondary {
        background: rgba(10, 16, 30, .55);
        border: 1px solid var(--border);
      }
      .footer {
        margin-top: 18px;
        color: rgba(167,178,214,.75);
        font-size: 12px;
        line-height: 1.6;
      }
      code {
        background: rgba(255,255,255,.07);
        border: 1px solid rgba(255,255,255,.10);
        padding: 2px 6px;
        border-radius: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        color: #d6e2ff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="header">
        <div class="title">SubtitleCat 中文字幕下载</div>
        <div class="subtitle">
          输入任意字符串（如 <code>hhd800.com@jul-185</code> / <code>JUL185 eng-zh-CN</code>），先解析展示结果，再一键下载中文 SRT（简体优先）。
        </div>
      </div>

      <div class="row">
        <div class="card">
          <div class="inputRow">
            <input id="query" type="text" placeholder="输入番号或任意标记（会自动识别番号）" />
            <button id="resolveBtn">解析</button>
            <button type="button" id="clearBtn" class="secondary">清空</button>
          </div>
          <div class="hint">
            <span class="pill">规则：按 downloads 降序取前 3 条</span>
            <span class="pill">规则：简体 &gt; 繁体 &gt; 中文兜底</span>
            <span class="pill">文件名：按你的输入命名</span>
          </div>
          <div id="status" class="status"></div>
        </div>

        <div class="card">
          <div style="font-weight:700; margin-bottom:8px;">结果预览</div>
          <div id="preview" class="grid"></div>
          <div id="downloadLinks" class="actions"></div>
        </div>
      </div>

      <div class="footer">
        后端由 Cloudflare Workers 提供服务。若提示“网络请求失败”，请稍后重试或更换网络环境。
      </div>
    </div>

    <!--
      GitHub Pages 项目页：若访问 .../site（无尾部 /），相对路径 ./app.js 会错误解析到 .../app.js，导致脚本 404，按钮无反应。
      下面按 pathname 计算与当前页同目录的 app.js 地址。
    -->
    <script>
      (function () {
        function pageBasePath() {
          var p = location.pathname;
          if (p.endsWith('/')) return p;
          if (/\.html$/i.test(p)) return p.replace(/\/[^/]+$/, '/');
          return p + '/';
        }
        var s = document.createElement('script');
        s.src = pageBasePath() + 'app.js';
        s.defer = true;
        document.body.appendChild(s);
      })();
    </script>
  </body>
</html>
